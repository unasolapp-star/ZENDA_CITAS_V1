<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenda - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Conectamos con tu hoja de estilos -->
    <link rel="stylesheet" href="style.css">
    <!-- Logo para la pestaña del navegador -->
    <link rel="icon" href="/logo.png?v=2" type="image/png">
</head>
<body>

    <div class="login-container">
        <!-- Lado Izquierdo: Branding -->
        <div class="brand-section" id="brand-section">
            <h1>Zenda</h1>
            <div class="mascots-wrapper" id="mascots-wrapper">
                <!-- Mascota 1: El Cuadrado -->
                <div class="mascot-animator" id="cuadrado">
                    <div class="mascot-3d-camera">
                        <div class="mascot-inner">
                            <div class="mascot-front">
                                <div class="square-body"></div>
                                <div class="face">
                                    <div class="eyebrows"><div class="eyebrow left"></div><div class="eyebrow right"></div></div>
                                    <div class="eyes-container">
                                        <div class="eye"><div class="pupil"></div></div>
                                        <div class="eye"><div class="pupil"></div></div>
                                    </div>
                                    <div class="mouth mouth-neutral"></div>
                                </div>
                            </div>
                            <div class="mascot-back">
                                <div class="square-body"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Mascota 2: El Círculo -->
                <div class="mascot-animator" id="circulo">
                    <div class="mascot-3d-camera">
                        <div class="mascot-inner">
                            <div class="mascot-front">
                                <div class="circle-body"></div>
                                <div class="face">
                                    <div class="eyebrows"><div class="eyebrow left"></div><div class="eyebrow right"></div></div>
                                    <div class="eyes-container">
                                        <div class="eye"><div class="pupil"></div></div>
                                        <div class="eye"><div class="pupil"></div></div>
                                    </div>
                                    <div class="mouth mouth-neutral"></div>
                                </div>
                            </div>
                            <div class="mascot-back">
                                <div class="circle-body"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lado Derecho: Formularios -->
        <div class="form-section">
            <div class="form-wrapper">
                <!-- FORMULARIO DE INICIO DE SESIÓN -->
                <form id="loginForm">
                    <h2>Iniciar Sesión</h2>
                    <p class="subtitle">Bienvenido de a Zenda</p>
                    
                    <div class="input-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label for="passwordField">Contraseña</label>
                        <input type="password" id="passwordField" required>
                    </div>
                    <button type="submit" class="btn-login">Ingresar</button>
                    <button type="button" onclick="continuarComoInvitado()" style="background:transparent; color:#2563eb; border:2px solid #2563eb; width:100%; padding:14px; border-radius:10px; cursor:pointer; margin-top:10px; font-weight:bold; transition:all 0.3s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
                        Continuar como invitado
                    </button>
                    
                    <div class="form-footer">
                        ¿No tienes cuenta? <a onclick="toggleForms()">Regístrate aquí</a>
                    </div>
                </form>

                <!-- FORMULARIO DE REGISTRO (Oculto por defecto) -->
                <form id="registerForm">
                    <h2>Crear Cuenta</h2>
                    <p class="subtitle">Únete a la plataforma Zenda</p>
                    
                    <div class="input-group"><label>Nombre Completo</label><input type="text" id="regName" required placeholder="Ej: Andrés Felipe Gómez Sáez"></div>
                    <div class="input-group"><label>Correo Electrónico</label><input type="email" id="regEmail" required placeholder="ejemplo@gmail.com"></div>
                    <div class="input-group"><label>Teléfono (10 dígitos)</label><input type="tel" id="regPhone" required maxlength="10" placeholder="Ej: 5512345678"></div>
                    <div class="input-group">
                        <label>Tipo de Rol</label>
                        <select id="regRole">
                            <option value="cliente">Soy Cliente</option>
                            <option value="negocio">Soy Dueño de Negocio</option>
                        </select>
                    </div>
                    <div class="input-group"><label>Contraseña</label><input type="password" id="regPass" required placeholder="Mín. 9 letras, 1 mayús, 1 núm, 1 esp. (_-/&$)"></div>
                    
                    <button type="submit" class="btn-login">Crear cuenta</button>
                    <button type="button" onclick="continuarComoInvitado()" style="background:transparent; color:#2563eb; border:2px solid #2563eb; width:100%; padding:14px; border-radius:10px; cursor:pointer; margin-top:10px; font-weight:bold; transition:all 0.3s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
                        Continuar como invitado
                    </button>
                    <div class="form-footer">
                        ¿Ya tienes cuenta? <a onclick="toggleForms()">Inicia sesión</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- MODAL DE VERIFICACIÓN DE CORREO -->
        <div id="verificationModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(4px);">
            <div style="background-color: #ffffff; margin: 15vh auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: slideDown 0.3s ease-out;">
                <div style="font-size: 40px; margin-bottom: 10px;">✉️</div>
                <h2 style="margin-top: 0; color: #1e293b; font-size: 1.5rem;">Verifica tu correo</h2>
                <p style="color: #475569; margin-bottom: 15px; font-size: 0.95rem; line-height: 1.5;">Hemos enviado un código a tu correo electrónico. Ingrésalo para crear tu cuenta.</p>
                
                <input type="text" id="verificationCode" placeholder="Ej: 1234567" maxlength="7" style="width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 20px; text-align: center; letter-spacing: 5px; margin-bottom: 10px; font-weight: bold; outline-color: #2563eb;">
                
                <div style="margin-bottom: 20px; font-size: 0.9rem; color: #64748b;">
                    <span id="timerDisplay" style="font-weight: 600;">Expira en: 05:00</span> | 
                    <a id="resendCodeBtn" style="color: #2563eb; font-weight: bold; cursor: pointer; text-decoration: none; transition: 0.2s;">Reenviar código</a>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="button" onclick="document.getElementById('verificationModal').style.display='none'; if(window.countdownInterval) clearInterval(window.countdownInterval);" style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: #e2e8f0; color: #475569; font-weight: bold; cursor: pointer; transition: 0.3s;">Cancelar</button>
                    <button type="button" id="btnVerifyCode" style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: #2563eb; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;">Verificar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Conectamos con tu lógica -->
    <script src="script.js"></script>
</body>
</html>
